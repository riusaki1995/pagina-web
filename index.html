<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agencia Gamer | Welcome</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Fondo con efecto de rejilla (Grid) */
        .background-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to right, rgba(0, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 0, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        .container {
            text-align: center;
            padding: 40px;
            border: 2px solid #0ff;
            box-shadow: 0 0 20px #0ff, inset 0 0 15px #0ff;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            position: relative;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            text-transform: uppercase;
            margin: 0;
            color: #fff;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #f0f,
                0 0 40px #f0f,
                0 0 80px #f0f;
            animation: flicker 2s infinite alternate;
        }

        p {
            font-size: 1.5rem;
            letter-spacing: 5px;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
            margin-top: 10px;
        }

        .btn {
            margin-top: 30px;
            padding: 15px 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            background: transparent;
            color: #0ff;
            border: 2px solid #0ff;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 30px #0ff;
        }

        /* Animación de parpadeo neón */
        @keyframes flicker {
            0%, 18%, 22%, 25%, 32%, 57%, 100% {
                text-shadow: 
                    0 0 5px #fff,
                    0 0 10px #fff,
                    0 0 20px #f0f,
                    0 0 40px #f0f,
                    0 0 80px #f0f;
            }
            20%, 24%, 55% {       
                text-shadow: none;
            }
        }

        /* Glitch decorativo lateral */
        .container::before {
            content: "";
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border: 1px solid #f0f;
            z-index: -1;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.05); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="background-grid"></div>

    <div class="container">
        <p>LEVEL 01</p>
        <h1>BIENVENIDO A LA AGENCIA</h1>
        <button class="btn">Iniciar Misión</button>
    </div>

</body>
</html>
